services:
  backup-verify:
    build: .
    image: backup-verify:latest
    container_name: backup-verify
    restart: unless-stopped
    ports:
      - "10122:10122"
    env_file:
      - .env
    environment:
      APP_HOST: 0.0.0.0
      APP_PORT: 10122
      BACKUP_ROOT: /mnt/qnap-backups/urbackup
      APP_DATA_DIR: /data
      APP_DB: /data/backup_verify.sqlite3
      RESULTS_FILE: /opt/backup-verify/results.json
    volumes:
      - backup_verify_data:/data
      - backup_verify_results:/opt/backup-verify
      - /mnt/qnap-backups/urbackup:/mnt/qnap-backups/urbackup:ro
      - /home/michaeld/.hermes/.env:/host-hermes/.env:ro
      - /dev:/dev:ro
    privileged: true
volumes:
  backup_verify_data:
  backup_verify_results:
